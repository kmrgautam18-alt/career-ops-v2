name: Career-Ops CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC — dependency audit

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22'
  BUN_VERSION: '1.3'

jobs:
  # ── Backend Tests ────────────────────────────────────────────────────
  backend-tests:
    name: Backend — Test & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: careerops
          POSTGRES_PASSWORD: test-password
          POSTGRES_DB: careerops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run lint (ruff)
        run: ruff check backend/app/ --no-fix

      - name: Run type check (mypy)
        run: mypy backend/app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

      - name: Run tests (SQLite)
        run: |
          DATABASE_URL='sqlite:///./data/test_ci.db' \
          SECRET_KEY='ci-secret-key-test' \
          python3 -m pytest tests/ -q --tb=short --timeout=60
        env:
          LLM_API_KEY: ''

      - name: Run tests (PostgreSQL)
        run: |
          DATABASE_URL='postgresql://careerops:test-password@localhost:5432/careerops_test' \
          SECRET_KEY='ci-secret-key-test' \
          python3 -m pytest tests/ -q --tb=short --timeout=60
        env:
          LLM_API_KEY: ''
        continue-on-error: true

  # ── Frontend Checks ──────────────────────────────────────────────────
  frontend-checks:
    name: Frontend — TypeScript & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        working-directory: frontend
        run: bun install

      - name: TypeScript check
        working-directory: frontend
        run: bun tsc -b --noEmit

      - name: Build
        working-directory: frontend
        run: bun run build

  # ── Docker Build ─────────────────────────────────────────────────────
  docker-build:
    name: Docker — Build & Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend-tests, frontend-checks]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: careerops-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          load: true
          tags: careerops-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start services
        run: |
          docker compose -f docker-compose.yml up -d postgres prometheus alertmanager
          sleep 10
          echo "Services started"

      - name: Verify backends
        run: |
          docker compose ps
          # Check prometheus is up
          curl -s http://localhost:9090/-/ready || echo "Prometheus not ready"

  # ── Dependency Audit ─────────────────────────────────────────────────
  dependency-audit:
    name: Security — Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Check Python dependencies
        uses: pypa/gh-action-pip-audit@v1
        with:
          inputs: requirements.txt

      - name: Check npm dependencies
        working-directory: frontend
        run: |
          bun audit 2>&1 || echo "Vulnerabilities found — review"

      - name: Check Docker images
        run: |
          docker pull prom/prometheus:v3.2.1
          docker pull grafana/grafana:11.6.0
          docker pull postgres:16-alpine
          docker scout quick prom/prometheus:v3.2.1 2>/dev/null || echo "Docker Scout not available"

  # ── Deploy (manual trigger only) ────────────────────────────────────
  deploy:
    name: Deploy — Docker Compose
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "
            cd /opt/career-ops-v2
            git pull origin main
            docker compose pull
            docker compose up -d --build
            docker compose exec -T backend alembic upgrade head
            echo 'Deployment complete!'
          "
