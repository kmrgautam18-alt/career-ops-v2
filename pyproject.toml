[tool.ruff]
line-length = 88
target-version = "py312"

exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "archive",
    "storage",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle
    "F",   # pyflakes
    "I",   # import sorting
    "UP",  # pyupgrade
    "B",   # bugbear
]

ignore = [
    "E501",  # Line too long
    "B008",  # FastAPI Depends()/Query()/File()/Form() pattern
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"