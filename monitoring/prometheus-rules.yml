# ==========================================
# Career-Ops Prometheus Alerting Rules
# ==========================================

groups:

  # ── Backend / API Alerts ───────────────────────────
  - name: careerops-backend
    interval: 30s
    rules:

      - alert: BackendDown
        expr: up{job="careerops-backend"} == 0
        for: 1m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "Backend is down"
          description: "The Career-Ops backend has been unreachable for over 1 minute."
          runbook: "https://github.com/kmrgautam18-alt/career-ops-v2/wiki/Runbooks#backend-down"

      - alert: HighErrorRate
        expr: rate(careerops_http_requests_total{status=~"5.."}[5m]) / rate(careerops_http_requests_total[5m]) > 0.05
        for: 3m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "High HTTP 5xx error rate"
          description: "The backend error rate is {{ humanizePercentage $value }} over the last 5 minutes (threshold: 5%)."
          value: "{{ $value | humanizePercentage }}"
          runbook: "https://github.com/kmrgautam18-alt/career-ops-v2/wiki/Runbooks#high-error-rate"

      - alert: High4xxRate
        expr: rate(careerops_http_requests_total{status=~"4.."}[5m]) / rate(careerops_http_requests_total[5m]) > 0.20
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "Elevated 4xx response rate"
          description: "The backend 4xx rate is {{ humanizePercentage $value }} over the last 5 minutes (threshold: 20%)."
          value: "{{ $value | humanizePercentage }}"

      - alert: HighLatency
        expr: histogram_quantile(0.95, sum(rate(careerops_http_request_duration_seconds_bucket[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "High API response latency"
          description: "p95 response latency is {{ $value }}s over the last 5 minutes (threshold: 2s)."
          value: "{{ $value }}s"
          runbook: "https://github.com/kmrgautam18-alt/career-ops-v2/wiki/Runbooks#high-latency"

      - alert: HighRequestRate
        expr: rate(careerops_http_requests_total[1m]) > 1000
        for: 1m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "Unusually high request rate"
          description: "The API is receiving {{ $value | humanize }} req/s — 10x normal load."

  # ── Database Alerts ────────────────────────────────
  - name: careerops-database
    interval: 30s
    rules:

      - alert: PostgresDown
        expr: up{job="careerops-postgres"} == 0
        for: 1m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL is down"
          description: "The PostgreSQL database has been unreachable for over 1 minute."
          runbook: "https://github.com/kmrgautam18-alt/career-ops-v2/wiki/Runbooks#postgres-down"

      - alert: SlowDatabaseQueries
        expr: histogram_quantile(0.95, sum(rate(careerops_db_query_duration_seconds_bucket[5m])) by (le, operation)) > 0.5
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "Slow database queries detected"
          description: "p95 query duration for {{ $labels.operation }} is {{ $value }}s (threshold: 0.5s)."

  # ── Infrastructure Alerts ──────────────────────────
  - name: careerops-infrastructure
    interval: 30s
    rules:

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: critical
          service: infrastructure
        annotations:
          summary: "Low disk space"
          description: "Disk usage is above 90% on {{ $labels.device }}."
          runbook: "https://github.com/kmrgautam18-alt/career-ops-v2/wiki/Runbooks#disk-space-low"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.90
        for: 5m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "High memory usage"
          description: "Memory usage is at {{ humanizePercentage $value }}."

      - alert: NginxDown
        expr: up{job="careerops-nginx"} == 0
        for: 1m
        labels:
          severity: critical
          service: nginx
        annotations:
          summary: "Nginx is down"
          description: "The Nginx reverse proxy has been unreachable for over 1 minute."
          runbook: "https://github.com/kmrgautam18-alt/career-ops-v2/wiki/Runbooks#nginx-down"

  # ── AI / LLM Alerts ────────────────────────────────
  - name: careerops-ai
    interval: 30s
    rules:

      - alert: HighAILatency
        expr: rate(careerops_ai_request_duration_seconds_sum[5m]) / rate(careerops_ai_request_duration_seconds_count[5m]) > 30
        for: 5m
        labels:
          severity: warning
          service: ai
        annotations:
          summary: "High AI response latency"
          description: "Average AI request duration for {{ $labels.feature }} is {{ $value }}s (threshold: 30s)."

      - alert: AIFailureRate
        expr: rate(careerops_http_requests_total{endpoint=~"/api/v1/ai/.*",status=~"5.."}[5m]) > 0
        for: 2m
        labels:
          severity: warning
          service: ai
        annotations:
          summary: "AI feature errors detected"
          description: "AI endpoints are returning 5xx errors."

  # ── Business / Growth Alerts ───────────────────────
  - name: careerops-business
    interval: 5m
    rules:

      - alert: NoNewUsers
        expr: rate(careerops_users_total[24h]) == 0
        for: 48h
        labels:
          severity: info
          service: business
        annotations:
          summary: "No new user registrations in 48 hours"
          description: "No new users have registered in the last 2 days."

      - alert: NoApplications
        expr: rate(careerops_applications_total[7d]) == 0
        for: 7d
        labels:
          severity: info
          service: business
        annotations:
          summary: "No job applications in 7 days"
          description: "No applications have been created in the last week."
