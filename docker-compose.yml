# ==========================================
# Career-Ops Docker Compose
# Production stack: PostgreSQL + Backend + Frontend (Nginx)
# ==========================================

services:

  postgres:
    image: postgres:16-alpine
    container_name: careerops-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-careerops}
      POSTGRES_USER: ${POSTGRES_USER:-careerops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?must be set}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-careerops} -d ${POSTGRES_DB:-careerops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: careerops-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-careerops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-careerops}
      APP_ENV: production
      DEBUG: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - resume_storage:/app/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: careerops-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      VITE_API_URL: /api
      BACKEND_URL: http://backend:8000

  # ======================================
  # Monitoring Stack
  # ======================================

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: careerops-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus-rules.yml:/etc/prometheus/rules/prometheus-rules.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend
      - alertmanager
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.6.0
    container_name: careerops-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?must be set}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Career-Ops"
    volumes:
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    ports:
      - "3001:3000"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    container_name: careerops-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-careerops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-careerops}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9187:9187"

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.5.0
    container_name: careerops-nginx-exporter
    restart: unless-stopped
    command:
      - '--nginx.scrape-uri=http://frontend:80/nginx-status'
    depends_on:
      - frontend
    ports:
      - "9113:9113"

  # ======================================
  # Logging Stack (Loki + Promtail)
  # ======================================

  loki:
    image: grafana/loki:3.4.2
    container_name: careerops-loki
    restart: unless-stopped
    command:
      - '-config.file=/etc/loki/loki-config.yml'
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.4.2
    container_name: careerops-promtail
    restart: unless-stopped
    command:
      - '-config.file=/etc/promtail/promtail-config.yml'
    volumes:
      - ./monitoring/loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  # ======================================
  # Automation Stack (n8n)
  # ======================================

  n8n:
    image: docker.n8n.io/n8nio/n8n:1.88.0
    container_name: careerops-n8n
    restart: unless-stopped
    environment:
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?must be set}
      N8N_METRICS: "true"
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 168
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_SKIP_WEBHOOK_DEREGISTRATION_ON_SHUTDOWN: "true"
      DB_TYPE: sqlite
      DB_SQLITE_DATABASE: /home/node/.n8n/database.sqlite
    volumes:
      - n8n_data:/home/node/.n8n
      - ./monitoring/n8n/workflows:/home/node/.n8n/workflows:ro
    ports:
      - "5678:5678"

  # ======================================
  # Alerting Stack (Alertmanager)
  # ======================================

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: careerops-alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--log.level=info'
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"

volumes:
  postgres_data:
  resume_storage:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:
  n8n_data: