# ==========================================
# Career-Ops Docker Compose
# Production stack: PostgreSQL + Backend + Frontend (Nginx)
# ==========================================

services:

  postgres:
    image: postgres:16-alpine
    container_name: careerops-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-careerops}
      POSTGRES_USER: ${POSTGRES_USER:-careerops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?must be set}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-careerops} -d ${POSTGRES_DB:-careerops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: careerops-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-careerops}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-careerops}
      APP_ENV: production
      DEBUG: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - resume_storage:/app/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: careerops-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      VITE_API_URL: /api
      BACKEND_URL: http://backend:8000

volumes:
  postgres_data:
  resume_storage:
